name: Deploy

# Fires only after the CI workflow completes successfully on main.
# This guarantees lint + tests pass before any deploy reaches production.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      # Write the production .env from the GitHub secret so docker compose
      # picks it up without storing the file in the repository.
      - name: Write .env
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
        run: printf '%s' "$APP_ENV" > .env

      - name: Build image
        run: docker compose build coverage-api

      - name: Deploy
        run: docker compose up -d

      # Poll /health via HTTPS through Caddy for up to 30 s.
      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -sf https://coverage-api.ddns.net/health; then
              echo "Health check passed"
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed after 30 s"
          exit 1
