services:
  coverage-api:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - coverage-api

volumes:
  caddy_data:
  caddy_config:
